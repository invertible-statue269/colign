{{- if .Values.hocuspocus.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-hocuspocus
  labels:
    {{- include "colign.labels" . | nindent 4 }}
    app.kubernetes.io/component: hocuspocus
spec:
  replicas: {{ .Values.hocuspocus.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "colign.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: hocuspocus
  template:
    metadata:
      labels:
        {{- include "colign.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: hocuspocus
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: hocuspocus
          image: "{{ .Values.hocuspocus.image.repository }}:{{ .Values.hocuspocus.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.hocuspocus.image.pullPolicy }}
          ports:
            - name: ws
              containerPort: 1234
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: {{ include "colign.databaseURL" . | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: jwt-secret
            {{- if .Values.hocuspocus.apiSecret }}
            - name: HOCUSPOCUS_API_SECRET
              value: {{ .Values.hocuspocus.apiSecret | quote }}
            {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          readinessProbe:
            httpGet:
              path: /healthz
              port: ws
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: ws
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.hocuspocus.resources | nindent 12 }}
{{- end }}
