{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-web
  labels:
    {{- include "colign.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: 3000
      protocol: TCP
  selector:
    {{- include "colign.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
{{- end }}
