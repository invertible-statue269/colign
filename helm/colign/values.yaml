## Colign Helm Chart Values

imagePullSecrets: []

## API Server
api:
  replicaCount: 1
  image:
    repository: ghcr.io/gobenpark/colign
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  migrate:
    enabled: true
  edition: ""       # "ee" for Enterprise Edition with OAuth MCP, empty for Community
  frontendURL: ""   # e.g., https://app.colign.co (defaults to internal service URL)
  redirectBaseURL: ""  # e.g., https://api.colign.co (defaults to internal service URL)
  env:
    jwtSecret: ""  # required: set via --set or secrets
    claudeApiKey: ""
    githubClientId: ""
    githubClientSecret: ""
    googleClientId: ""
    googleClientSecret: ""

## Web Frontend (Next.js)
web:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/gobenpark/colign-web
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

## Hocuspocus (Real-time collaboration)
hocuspocus:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/gobenpark/colign-hocuspocus
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 1234
  apiSecret: ""  # shared secret for internal API (MCP → Hocuspocus document sync)
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

## Ingress
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: colign.example.com
      paths:
        - path: /
          service: web
        - path: /api
          service: api
        - path: /mcp
          service: api
        - path: /ws
          service: hocuspocus
  tls: []

## Database Configuration
## Option 1: Use an existing PostgreSQL (set externalDatabase and postgresql.enabled=false)
## Option 2: Deploy PostgreSQL via Bitnami subchart (default)
externalDatabase:
  host: ""
  port: 5432
  username: ""
  password: ""
  database: colign
  schema: public    # optional, default: public
  sslmode: disable  # disable, require, verify-ca, verify-full
  # url: ""         # if set, overrides all fields above

## PostgreSQL (Bitnami subchart) — used when externalDatabase.host is empty
postgresql:
  enabled: true
  auth:
    username: colign
    password: ""  # auto-generated if empty
    database: colign
  primary:
    persistence:
      size: 10Gi

## Redis Configuration
## Option 1: Use an existing Redis (set externalRedis and redis.enabled=false)
## Option 2: Deploy Redis via Bitnami subchart (default)
externalRedis:
  host: ""
  port: 6379
  password: ""
  # url: ""  # if set, overrides host/port/password

## Redis (Bitnami subchart) — used when externalRedis.host is empty
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      size: 1Gi
