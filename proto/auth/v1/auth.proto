syntax = "proto3";

package auth.v1;

option go_package = "github.com/gobenpark/colign/gen/proto/auth/v1;authv1";

message RegisterRequest {
  string email = 1;
  string password = 2;
  string name = 3;
  string organization_name = 4;
}

message RegisterResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_at = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_at = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_at = 3;
}

message VerifyEmailRequest {
  string token = 1;
}

message VerifyEmailResponse {
  string message = 1;
}

message GetOAuthURLRequest {
  string provider = 1;
}

message GetOAuthURLResponse {
  string url = 1;
}

message OAuthCallbackRequest {
  string provider = 1;
  string code = 2;
  string state = 3;
}

message OAuthCallbackResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_at = 3;
}

message MeRequest {}

message MeResponse {
  int64 user_id = 1;
  string email = 2;
  string name = 3;
  int64 org_id = 4;
  string avatar_url = 5;
}

message UpdateProfileRequest {
  string name = 1;
  string avatar_url = 2;
}

message UpdateProfileResponse {
  int64 user_id = 1;
  string email = 2;
  string name = 3;
  int64 org_id = 4;
  string avatar_url = 5;
}

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse) {}
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse) {}
  rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse) {}
  rpc GetOAuthURL(GetOAuthURLRequest) returns (GetOAuthURLResponse) {}
  rpc OAuthCallback(OAuthCallbackRequest) returns (OAuthCallbackResponse) {}
  rpc Me(MeRequest) returns (MeResponse) {}
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse) {}
}
