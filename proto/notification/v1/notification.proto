syntax = "proto3";

package notification.v1;

option go_package = "github.com/gobenpark/colign/gen/proto/notification/v1;notificationv1";

import "google/protobuf/timestamp.proto";

message MentionedUser {
  int64 user_id = 1;
  string name = 2;
  string email = 3;
}

message Notification {
  int64 id = 1;
  int64 user_id = 2;
  string type = 3;
  bool read = 4;
  int64 actor_id = 5;
  string actor_name = 6;
  int64 change_id = 7;
  string change_name = 8;
  int64 project_id = 9;
  string project_name = 10;
  string project_slug = 11;
  string stage = 12;
  string comment_preview = 13;
  google.protobuf.Timestamp created_at = 14;
  int64 organization_id = 15;
  repeated MentionedUser mentioned_users = 16;
}

message ListNotificationsRequest {
  string filter = 1; // "all", "unread", or notification type
}

message ListNotificationsResponse {
  repeated Notification notifications = 1;
  int32 unread_count = 2;
}

message MarkReadRequest {
  int64 id = 1;
  bool read = 2;
}

message MarkReadResponse {}

message MarkAllReadRequest {}

message MarkAllReadResponse {}

message GetUnreadCountRequest {}

message GetUnreadCountResponse {
  int32 count = 1;
}

// Real-time event streaming
message SubscribeRequest {
  int64 change_id = 1; // subscribe to events for a specific change (0 = all)
}

message SubscribeResponse {
  string type = 1;       // "task_created", "task_updated", "document_updated", "change_updated"
  int64 change_id = 2;
  string payload = 3;    // JSON-encoded event data
  google.protobuf.Timestamp timestamp = 4;
}

service NotificationService {
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse) {}
  rpc MarkRead(MarkReadRequest) returns (MarkReadResponse) {}
  rpc MarkAllRead(MarkAllReadRequest) returns (MarkAllReadResponse) {}
  rpc GetUnreadCount(GetUnreadCountRequest) returns (GetUnreadCountResponse) {}
  rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse) {}
}
