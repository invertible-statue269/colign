syntax = "proto3";

package organization.v1;

option go_package = "github.com/gobenpark/colign/gen/proto/organization/v1;organizationv1";

import "google/protobuf/timestamp.proto";

message Organization {
  int64 id = 1;
  string name = 2;
  string slug = 3;
  google.protobuf.Timestamp created_at = 4;
  repeated string allowed_domains = 5;
}

message OrganizationMember {
  int64 id = 1;
  int64 organization_id = 2;
  int64 user_id = 3;
  string role = 4;
  string user_name = 5;
  string user_email = 6;
}

// List organizations the current user belongs to
message ListOrganizationsRequest {}

message ListOrganizationsResponse {
  repeated Organization organizations = 1;
  int64 current_org_id = 2;
}

// Switch current organization (returns new token pair)
message SwitchOrganizationRequest {
  int64 organization_id = 1;
}

message SwitchOrganizationResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_at = 3;
  Organization organization = 4;
}

// Create a new organization for the current user
message CreateOrganizationRequest {
  string name = 1;
}

message CreateOrganizationResponse {
  Organization organization = 1;
}

// Update organization name
message UpdateOrganizationRequest {
  int64 id = 1;
  string name = 2;
}

message UpdateOrganizationResponse {
  Organization organization = 1;
}

// List members of the current organization
message ListMembersRequest {}

message ListMembersResponse {
  repeated OrganizationMember members = 1;
}

// Invite a user to the organization by email
message InviteOrgMemberRequest {
  string email = 1;
  string role = 2; // "owner", "admin", "member"
}

message OrgInvitation {
  int64 id = 1;
  int64 organization_id = 2;
  string email = 3;
  string role = 4;
  string token = 5;
  string status = 6;
  google.protobuf.Timestamp expires_at = 7;
  google.protobuf.Timestamp created_at = 8;
  Organization organization = 9;
}

message InviteOrgMemberResponse {
  OrgInvitation invitation = 1;
}

// Accept an invitation by token
message AcceptInvitationRequest {
  string token = 1;
}

message AcceptInvitationResponse {
  OrganizationMember member = 1;
}

// Get invitation details by token (public, no auth required)
message GetInvitationRequest {
  string token = 1;
}

message GetInvitationResponse {
  OrgInvitation invitation = 1;
}

// List pending invitations for the current organization
message ListInvitationsRequest {}

message ListInvitationsResponse {
  repeated OrgInvitation invitations = 1;
}

// Revoke a pending invitation
message RevokeInvitationRequest {
  int64 invitation_id = 1;
}

message RevokeInvitationResponse {}

// Remove a member from the organization
message RemoveOrgMemberRequest {
  int64 user_id = 1;
}

message RemoveOrgMemberResponse {}

// Update a member's role
message UpdateOrgMemberRoleRequest {
  int64 user_id = 1;
  string role = 2;
}

message UpdateOrgMemberRoleResponse {
  OrganizationMember member = 1;
}

// Set allowed email domains for auto-join
message SetAllowedDomainsRequest {
  repeated string domains = 1;
}

message SetAllowedDomainsResponse {
  Organization organization = 1;
}

service OrganizationService {
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse) {}
  rpc SwitchOrganization(SwitchOrganizationRequest) returns (SwitchOrganizationResponse) {}
  rpc CreateOrganization(CreateOrganizationRequest) returns (CreateOrganizationResponse) {}
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (UpdateOrganizationResponse) {}
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse) {}
  rpc InviteOrgMember(InviteOrgMemberRequest) returns (InviteOrgMemberResponse) {}
  rpc AcceptInvitation(AcceptInvitationRequest) returns (AcceptInvitationResponse) {}
  rpc GetInvitation(GetInvitationRequest) returns (GetInvitationResponse) {}
  rpc ListInvitations(ListInvitationsRequest) returns (ListInvitationsResponse) {}
  rpc RevokeInvitation(RevokeInvitationRequest) returns (RevokeInvitationResponse) {}
  rpc RemoveOrgMember(RemoveOrgMemberRequest) returns (RemoveOrgMemberResponse) {}
  rpc UpdateOrgMemberRole(UpdateOrgMemberRoleRequest) returns (UpdateOrgMemberRoleResponse) {}
  rpc SetAllowedDomains(SetAllowedDomainsRequest) returns (SetAllowedDomainsResponse) {}
}
