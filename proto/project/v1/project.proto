syntax = "proto3";

package project.v1;

option go_package = "github.com/gobenpark/colign/gen/proto/project/v1;projectv1";

import "google/protobuf/timestamp.proto";

// Project messages

message Project {
  int64 id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  string status = 7;
  string priority = 8;
  string health = 9;
  optional int64 lead_id = 10;
  string lead_name = 11;
  optional string start_date = 12;
  optional string target_date = 13;
  string icon = 14;
  string color = 15;
  repeated ProjectLabel labels = 16;
  string lead_avatar_url = 17;
  string readme = 18;
}

message ProjectMember {
  int64 id = 1;
  int64 project_id = 2;
  int64 user_id = 3;
  string role = 4;
  string user_name = 5;
  string user_email = 6;
}

message ProjectLabel {
  int64 id = 1;
  string name = 2;
  string color = 3;
}

message Change {
  int64 id = 1;
  int64 project_id = 2;
  string name = 3;
  string stage = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  optional google.protobuf.Timestamp archived_at = 7;
}

// Project CRUD

message CreateProjectRequest {
  string name = 1;
  string description = 2;
}

message CreateProjectResponse {
  Project project = 1;
}

message GetProjectRequest {
  string slug = 1;
}

message GetProjectResponse {
  Project project = 1;
  repeated ProjectMember members = 2;
}

message ListProjectsRequest {}

message ListProjectsResponse {
  repeated Project projects = 1;
}

message UpdateProjectRequest {
  int64 id = 1;
  string name = 2;
  string description = 3;
  optional string status = 4;
  optional string priority = 5;
  optional string health = 6;
  optional int64 lead_id = 7;
  optional string start_date = 8;
  optional string target_date = 9;
  optional string icon = 10;
  optional string color = 11;
  optional string readme = 12;
  int64 project_id = 13;
}

message UpdateProjectResponse {
  Project project = 1;
}

message DeleteProjectRequest {
  int64 id = 1;
  int64 project_id = 2;
}

message DeleteProjectResponse {}

// Member management

message InviteMemberRequest {
  int64 project_id = 1;
  string email = 2;
  string role = 3;
}

message InviteMemberResponse {
  ProjectMember member = 1;
}

// Label management

message CreateLabelRequest {
  string name = 1;
  string color = 2;
}

message CreateLabelResponse {
  ProjectLabel label = 1;
}

message ListLabelsRequest {}

message ListLabelsResponse {
  repeated ProjectLabel labels = 1;
}

message AssignLabelRequest {
  int64 project_id = 1;
  int64 label_id = 2;
}

message AssignLabelResponse {}

message RemoveLabelRequest {
  int64 project_id = 1;
  int64 label_id = 2;
}

message RemoveLabelResponse {}

// Change CRUD

message CreateChangeRequest {
  int64 project_id = 1;
  string name = 2;
}

message CreateChangeResponse {
  Change change = 1;
}

message ListChangesRequest {
  int64 project_id = 1;
  optional string filter = 2;
}

message ListChangesResponse {
  repeated Change changes = 1;
}

message GetChangeRequest {
  int64 id = 1;
  int64 project_id = 2;
}

message GetChangeResponse {
  Change change = 1;
}

message DeleteChangeRequest {
  int64 id = 1;
  int64 project_id = 2;
}

message DeleteChangeResponse {}

// Archive
message ArchiveChangeRequest {
  int64 change_id = 1;
  int64 project_id = 2;
}
message ArchiveChangeResponse {
  Change change = 1;
}

message UnarchiveChangeRequest {
  int64 change_id = 1;
  int64 project_id = 2;
}
message UnarchiveChangeResponse {
  Change change = 1;
}

// Archive Policy
message ArchivePolicyMsg {
  int64 project_id = 1;
  string mode = 2;
  string trigger = 3;
  int32 days_delay = 4;
}

message GetArchivePolicyRequest {
  int64 project_id = 1;
}
message GetArchivePolicyResponse {
  ArchivePolicyMsg policy = 1;
}

message UpdateArchivePolicyRequest {
  int64 project_id = 1;
  string mode = 2;
  string trigger = 3;
  int32 days_delay = 4;
}
message UpdateArchivePolicyResponse {
  ArchivePolicyMsg policy = 1;
}

// Search
message SearchRequest {
  string query = 1;
}

message SearchResult {
  string type = 1;       // "change", "task", "project"
  int64 id = 2;
  string title = 3;
  string subtitle = 4;   // stage, status, project name
  string slug = 5;       // for navigation
  int64 project_id = 6;
}

message SearchResponse {
  repeated SearchResult results = 1;
}

service ProjectService {
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse) {}
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse) {}
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse) {}
  rpc UpdateProject(UpdateProjectRequest) returns (UpdateProjectResponse) {}
  rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse) {}
  rpc InviteMember(InviteMemberRequest) returns (InviteMemberResponse) {}
  rpc CreateLabel(CreateLabelRequest) returns (CreateLabelResponse) {}
  rpc ListLabels(ListLabelsRequest) returns (ListLabelsResponse) {}
  rpc AssignLabel(AssignLabelRequest) returns (AssignLabelResponse) {}
  rpc RemoveLabel(RemoveLabelRequest) returns (RemoveLabelResponse) {}
  rpc CreateChange(CreateChangeRequest) returns (CreateChangeResponse) {}
  rpc ListChanges(ListChangesRequest) returns (ListChangesResponse) {}
  rpc GetChange(GetChangeRequest) returns (GetChangeResponse) {}
  rpc DeleteChange(DeleteChangeRequest) returns (DeleteChangeResponse) {}
  rpc ArchiveChange(ArchiveChangeRequest) returns (ArchiveChangeResponse) {}
  rpc UnarchiveChange(UnarchiveChangeRequest) returns (UnarchiveChangeResponse) {}
  rpc GetArchivePolicy(GetArchivePolicyRequest) returns (GetArchivePolicyResponse) {}
  rpc UpdateArchivePolicy(UpdateArchivePolicyRequest) returns (UpdateArchivePolicyResponse) {}
  rpc Search(SearchRequest) returns (SearchResponse) {}
}
