syntax = "proto3";

package task.v1;

option go_package = "github.com/gobenpark/colign/gen/proto/task/v1;taskv1";

import "google/protobuf/timestamp.proto";

message Task {
  int64 id = 1;
  int64 change_id = 2;
  string title = 3;
  string description = 4;
  string status = 5;
  int32 order_index = 6;
  string spec_ref = 7;
  optional int64 assignee_id = 8;
  optional int64 creator_id = 9;
  string assignee_name = 10;
  string creator_name = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message ListTasksRequest {
  int64 change_id = 1;
}

message ListTasksResponse {
  repeated Task tasks = 1;
}

message CreateTaskRequest {
  int64 change_id = 1;
  string title = 2;
  string description = 3;
  string status = 4;
  string spec_ref = 5;
  optional int64 assignee_id = 6;
}

message CreateTaskResponse {
  Task task = 1;
}

message UpdateTaskRequest {
  int64 id = 1;
  optional string title = 2;
  optional string description = 3;
  optional string status = 4;
  optional string spec_ref = 5;
  optional int64 assignee_id = 6;
  bool clear_assignee = 7;
}

message UpdateTaskResponse {
  Task task = 1;
}

message DeleteTaskRequest {
  int64 id = 1;
}

message DeleteTaskResponse {}

message ReorderItem {
  int64 id = 1;
  string status = 2;
  int32 order_index = 3;
}

message ReorderTasksRequest {
  int64 change_id = 1;
  repeated ReorderItem items = 2;
}

message ReorderTasksResponse {}

service TaskService {
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse) {}
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse) {}
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse) {}
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse) {}
  rpc ReorderTasks(ReorderTasksRequest) returns (ReorderTasksResponse) {}
}
